name: Twice-Weekly LinkedIn Automation

on:
  schedule:
    # Runs at 08:00 UTC (11:00 AM Riyadh Time) every Sunday and Wednesday
    - cron: '0 8 * * 0,3'
  workflow_dispatch: # This allows you to manually click a button to test it anytime

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install psycopg2-binary google-generativeai requests

    - name: Run Automation Script
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
        LINKEDIN_ORG_ID: ${{ secrets.LINKEDIN_ORG_ID }}
      run: python linkedin_automator.py
