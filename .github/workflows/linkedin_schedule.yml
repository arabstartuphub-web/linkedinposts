name: Scheduled LinkedIn Automation

on:
  schedule:
    # Sun, Mon, Wed, Thu, Sat at 10:00 AM AST (07:00 UTC)
    - cron: '0 7 * * 0,1,3,4,6'
    # Tue, Fri at 10:00 AM GST (06:00 UTC)
    - cron: '0 6 * * 2,5'

  workflow_dispatch:

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install psycopg2-binary requests

      - name: Run Automation Script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_BACKUP1: ${{ secrets.GEMINI_API_KEY_BACKUP1 }}
          GEMINI_API_KEY_BACKUP2: ${{ secrets.GEMINI_API_KEY_BACKUP2 }}
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
        run: python linkedin_automator.py
