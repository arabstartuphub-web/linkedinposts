name: Scheduled LinkedIn Automation

on:
  schedule:
    # 1. Sunday, Monday, Wednesday, Thursday, Saturday at 10:00 AM AST (07:00 AM UTC)
    # Target Ecosystems: GCC, Saudi Arabia, Qatar, Kuwait, Bahrain
    - cron: '0 7 * * 0,1,3,4,6'

    # 2. Tuesday and Friday at 10:00 AM GST (06:00 AM UTC)
    # Target Ecosystems: UAE, Oman
    - cron: '0 6 * * 2,5'
    
  workflow_dispatch: # Allows you to manually trigger runs anytime from the Actions UI

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install psycopg2-binary requests google-generativeai

    - name: Run Automation Script
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
      run: python linkedin_automator.py
