name: Scheduled LinkedIn Automation

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  run-automation:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Fonts
        run: |
          sudo apt-get install -y fonts-open-type ttf-mscorefonts-installer fontconfig || true
          sudo fc-cache -f -v
          # Download Poppins directly — most reliable method
          mkdir -p /usr/share/fonts/truetype/google-fonts
          curl -fsSL "https://github.com/google/fonts/raw/main/ofl/poppins/Poppins-Bold.ttf" -o /usr/share/fonts/truetype/google-fonts/Poppins-Bold.ttf
          curl -fsSL "https://github.com/google/fonts/raw/main/ofl/poppins/Poppins-Medium.ttf" -o /usr/share/fonts/truetype/google-fonts/Poppins-Medium.ttf
          sudo fc-cache -f -v
          echo "Fonts installed:"
          ls /usr/share/fonts/truetype/google-fonts/

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Automation Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_BACKUP1: ${{ secrets.GEMINI_API_KEY_BACKUP1 }}
          GEMINI_API_KEY_BACKUP2: ${{ secrets.GEMINI_API_KEY_BACKUP2 }}
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python linkedin_automator.py
