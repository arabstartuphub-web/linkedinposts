name: Daily Scheduled LinkedIn Automation

on:
  schedule:
    - cron: '0 5 * * *'  # Runs every day at 5:00 AM UTC (8:00 AM Riyadh time)
  workflow_dispatch:      # Keeps the manual "Run workflow" button active for testing

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install psycopg2-binary google-generativeai requests

    - name: Run Automation Script
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
        LINKEDIN_ORG_ID: ${{ secrets.LINKEDIN_ORG_ID }}
      run: python linkedin_automator.py
