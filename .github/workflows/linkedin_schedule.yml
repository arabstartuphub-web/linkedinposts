name: Scheduled LinkedIn Automation

on:
  schedule:
    # Runs everyday at 9:00 AM UTC (12:00 PM Riyadh/GCC time)
    - cron: '0 9 * * *'
  workflow_dispatch: # Allows you to trigger it manually from the Actions tab

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install psycopg2-binary requests google-generativeai

    - name: Run Automation Script
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
      run: python linkedin_automator.py
